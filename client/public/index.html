<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>F7Lans - Gaming Community</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=20260524g">
</head>
<body>
    <div id="app">
        <!-- Connection Screen -->
        <div id="connectionScreen" class="connection-screen">
            <div class="connection-card">
                <div class="logo">
                    <img src="logo.svg" alt="F7Lans" class="logo-icon-img">
                    <h1>F7Lans</h1>
                    <p>Web Client</p>
                </div>

                <form id="connectionForm" class="connection-form">
                    <input type="hidden" id="serverUrl" value="">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="Enter username" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>
                    <div class="form-group checkbox">
                        <label>
                            <input type="checkbox" id="rememberMe" checked>
                            Remember me
                        </label>
                    </div>
                    <button type="submit" class="btn-primary">Connect</button>
                    <div class="error-message" id="errorMessage"></div>
                </form>

                <div id="googleAuthSection" class="google-auth-section" style="display: none;">
                    <div class="auth-divider"><span>or</span></div>
                    <button type="button" id="googleSignInBtn" class="btn-google">
                        <svg class="google-icon" viewBox="0 0 18 18" width="18" height="18" aria-hidden="true">
                            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.836.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
                            <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
                            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.167 6.656 3.58 9 3.58z"/>
                        </svg>
                        <span>Sign in with Google</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Main App (hidden until connected) -->
        <div id="mainApp" class="main-app" style="display: none;">
            <!-- Will be populated by app.js -->
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
    <script src="app.js?v=20260524h"></script>
</body>
</html>
